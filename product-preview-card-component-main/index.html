<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device --> 
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Product preview card component</title>
</head>
<body>
  <div class="container">
    <div class="left">
      <img src="./images/image-product-desktop.jpg" alt="Parfum" width="250px">
    </div>
    <div class="right">
      <p>Perfume</p>
      <h1>Gabrielle<br> Essence Eau De Parfum</h1>
      <p>A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>
      <div class="prix">
        <p class="prix1">$149.99</p>
        <p class="prix2"><s>$169.99</s></p>
      </div>
      <button><img src="./images/icon-cart.svg" alt="chariot"> Add to Cart</button>
    </div>
  </div>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/florian-uh/front-end-mentor/tree/main/product-preview-card-component-main">florian-uh</a>.
  </div>
</body>
</html>

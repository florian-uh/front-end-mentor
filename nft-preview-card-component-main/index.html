<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | NFT preview card component</title>
  <link rel="stylesheet" href="style.css">
  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
</head>
<body>
  <div class="tour">
    <div class="card">
        <div class="presentation">
          <img src="./images/image-equilibrium.jpg" alt="image-equilibrium">
        </div>
        <div class="info">
          <h2>Equilibrium #3429</h2>
          <p>Our Equilibrium collection promotes balance and calm.</p>
        </div>
        <div class="valeur">
            <div class="block">
              <img src="./images/icon-ethereum.svg" alt="icon-ethereum">
              <p>0.041 ETH</p>
            </div>
            <div class="block">
              <img src="./images/icon-clock.svg" alt="icon-clock">
              <p>3 days left</p>
            </div>
        </div>
        <hr>
        <div class="author">
          <img src="./images/image-avatar.png" alt="image-avatar">
          <p>Creation of Jules Wyvern</p>
        </div>
    </div>
  </div>
    <div class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
      Coded by <a href="#">Your Name Here</a>.
    </div>
</body>
</html>
